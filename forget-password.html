<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="css/forget-password.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="login-container">

        <!-- Top -->
        <div class="login-top">

            <a href="login.html">
                <i class="fa-solid fa-angle-left"></i>
            </a>

            <img src="image/logo.png" alt="">

            <div class="lang">
                <img src="image/flag.png">
                <span>EN</span>
            </div>

        </div>

        <!-- Title -->
        <div class="login-title">
            <h2>Forgot password</h2>
            <p>
                Please retrieve/change your password through your mobile phone number or email.
            </p>
        </div>

        <!-- Tabs -->
        <div class="login-tabs">

            <button class="tab-btn active" data-tab="phone">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <span>Phone Reset</span>
            </button>

            <button class="tab-btn" data-tab="email">
                <i class="fa-solid fa-envelope"></i>
                <span>Mailbox Reset</span>
            </button>

        </div>

        <!-- PHONE RESET -->
        <form id="phoneForm" class="login-form active-form">

            <label>
                <i class="fa-solid fa-mobile-screen-button"></i>
                Phone Number
            </label>

            <div class="phone-box">

                <select id="countryCode">
                    <option>+91</option>
                    <option>+1</option>
                    <option>+44</option>
                </select>

                <input type="number" id="phone" placeholder="Please enter the phone number">

            </div>

            <small class="error" id="phoneError"></small>


            <label>
                <i class="fa-solid fa-lock"></i>
                New Password
            </label>

            <div class="password-box">

                <input type="password" id="newPassword" placeholder="New Password">

                <i class="fa-regular fa-eye-slash togglePassword"></i>

            </div>

            <small class="error" id="newPasswordError"></small>


            <label>
                <i class="fa-solid fa-lock"></i>
                Confirm Password
            </label>

            <div class="password-box">

                <input type="password" id="confirmPassword" placeholder="Confirm Password">

                <i class="fa-regular fa-eye-slash togglePassword"></i>

            </div>

            <small class="error" id="confirmPasswordError"></small>


            <label>
                <i class="fa-solid fa-shield-halved"></i>
                Verification Code
            </label>

            <div class="phone-box">

                <input type="text" id="otp" placeholder="Please enter verification code">

                <button type="button" class="send-btn">
                    Send
                </button>
            </div>

            <small class="error" id="otpError"></small>


            <div class="remember">

                <input type="checkbox" id="agree">

                <label for="agree">
                    I have read and agree
                   <span class="privacy-link">
                        [Privacy Agreement]
                    </span>
                </label>

            </div>

            <small class="error" id="agreeError"></small>

            <button type="submit" class="login-btn">
                Reset
            </button>

        </form>


        <!-- EMAIL RESET -->
        <form id="emailForm" class="login-form">

            <label>
                <i class="fa-solid fa-envelope"></i>
                Email Address
            </label>

            <input type="email" id="email" placeholder="Please enter your email">

            <small class="error" id="emailError"></small>


            <label>
                <i class="fa-solid fa-lock"></i>
                New Password
            </label>

            <div class="password-box">

                <input type="password" id="emailNewPassword" placeholder="New Password">

                <i class="fa-regular fa-eye-slash togglePassword"></i>

            </div>

            <small class="error" id="emailNewPasswordError"></small>


            <label>
                <i class="fa-solid fa-lock"></i>
                Confirm Password
            </label>

            <div class="password-box">

                <input type="password" id="emailConfirmPassword" placeholder="Confirm Password">

                <i class="fa-regular fa-eye-slash togglePassword"></i>

            </div>

            <small class="error" id="emailConfirmPasswordError"></small>


            <label>
                <i class="fa-solid fa-shield-halved"></i>
                Verification Code
            </label>

            <div class="phone-box">

                <input type="text" id="emailOtp" placeholder="Please enter verification code">

                <button type="button" class="send-btn">
                    Send
                </button>

            </div>

            <small class="error" id="emailOtpError"></small>


            <div class="remember">

                <input type="checkbox" id="emailAgree">

                <label for="emailAgree">
                    I have read and agree
                    <span style="color:#ff4d4d;">Privacy Agreement</span>
                </label>

            </div>

            <small class="error" id="emailAgreeError"></small>


            <button type="submit" class="login-btn">
                Reset
            </button>

        </form>

    </div>
    </div>

    <script src="js/forget-password.js"></script>
</body>

</html>
