<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDG Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="login-container">

        <!-- Top -->

        <div class="login-top">

            <a href="index.html"><i class="fa-solid fa-angle-left"></i></a>

            <img src="image/logo.png" alt="">
            <div class="lang">
                <img src="image/flag.png">
                <span>EN</span>
            </div>
        </div>
        <!-- Title -->
        <div class="login-title">
            <h2>Log in</h2>
            <p>
                Please log in with your phone number or email
                If you forget your password, please contact customer service
            </p>
        </div>
        <!-- Tabs -->

        <div class="login-tabs">

            <button class="tab-btn active" data-tab="phone">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <span>phone number</span>
            </button>

            <button class="tab-btn" data-tab="email">
                <i class="fa-solid fa-envelope"></i>
                <span>Email / Account</span>
            </button>

        </div>

        <!-- PHONE FORM -->
        <form id="phoneForm" class="login-form active-form">
            <label>
                <i class="fa-solid fa-mobile-screen-button"></i>
                Phone number
            </label>

            <div class="phone-box">

                <select>
                    <option>+91</option>
                    <option>+1</option>
                    <option>+44</option>
                </select>

                <input type="number" placeholder="Please enter the phone number" id="phone">
                
            </div>
             <small class="error" id="phoneError"></small>

            <label>
                <i class="fa-solid fa-lock"></i>
                Password
            </label>

            <div class="password-box">

                <input type="password" placeholder="Password" id="phonePassword">

                <i class="fa-regular fa-eye-slash togglePassword"></i>
            </div>
             <small class="error" id="passwordError"></small>

            <div class="remember">

                <input type="checkbox" id="remember">
                <label for="remember">Remember password</label>
                <small class="error" id="agreeError"></small>

            </div>
            <button type="submit" class="login-btn">
                Log in
            </button>

            <a href="register.html" class="register-btn">
                Register
            </a>

            <!-- Bottom Options -->

            <div class="bottom-options">

                <a href="forget-password.html" class="bottom-item forgot-btn">
                    <div class="icon-box">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <span>Forgot password</span>
                </a>

                <a href="#" class="bottom-item">
                    <div class="icon-box">
                        <i class="fa-solid fa-headset"></i>
                    </div>
                    <span>Customer Service</span>
                </a>

            </div>

        </form>

        <!-- EMAIL FORM -->
        <form id="emailForm" class="login-form">

            <label>
                <i class="fa-solid fa-envelope"></i>
                Email / Account Log in
            </label>

            <input type="email" id="email" placeholder="please input your email">
            <small class="error" id="emailError"></small>

            <label>
                <i class="fa-solid fa-lock"></i>
                Password
            </label>

            <div class="password-box">

                <input type="password" id="emailPassword" placeholder="Password">

                <i class="fa-regular fa-eye-slash togglePassword"></i>

            </div>
            <small class="error" id="emailPasswordError"></small>

            <div class="remember">

                <input type="checkbox" id="rememberEmail">
                <label for="rememberEmail">
                    Remember password
                </label>

            </div>

            <button type="submit" class="login-btn">
                Log in
            </button>

            <a href="register.html" class="register-btn">
                Register
            </a>
            <div class="bottom-options">

                <a href="forget-password.html" class="bottom-item forgot-btn">
                    <div class="icon-box">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <span>Forgot password</span>
                </a>

                <a href="#" class="bottom-item">
                    <div class="icon-box">
                        <i class="fa-solid fa-headset"></i>
                    </div>
                    <span>Customer Service</span>
                </a>

            </div>

        </form>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
